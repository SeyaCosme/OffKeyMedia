<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Booking | OFFKEY MEDIA</title>
  <link rel="stylesheet" href="style.css">
</head>
<body class="site-page">
  <header class="page-header">
    <div class="header-inner">
      <button class="back-link" onclick="go('index.html', event)">Home - Back to Piano</button>
      <h1 class="page-title">Booking</h1>
      <span></span>
    </div>
  </header>

  <main class="page-main">
    <section class="intro">
      <h2>Book Your <span class="accent">Session</span></h2>
      <p>Fill out the form below and OFFKEY MEDIA will get back to you about your shoot, event, or production.</p>
    </section>

    <section class="success">
      <h2>Request Received</h2>
      <p>Thank you, <span id="successName" class="accent">friend</span>.</p>
      <p>We will get back to you at <span id="successEmail"></span>.</p>
      <button class="button" onclick="resetBooking()">Submit Another Request</button>
    </section>

    <form class="booking-form" onsubmit="submitBooking(event)">
      <div class="form-row">
        <div class="field">
          <label for="name">Full Name</label>
          <input id="name" name="name" required placeholder="Jane Doe">
        </div>
        <div class="field">
          <label for="email">Email</label>
          <input id="email" name="email" type="email" required placeholder="you@email.com">
        </div>
      </div>

      <div class="form-row">
        <div class="field">
          <label for="phone">Phone</label>
          <input id="phone" name="phone" type="tel" placeholder="(555) 123-4567">
        </div>
        <div class="field">
          <label for="eventDate">Event Date</label>
          <input id="eventDate" name="eventDate" type="date" required>
        </div>
      </div>

      <div class="field">
        <label for="eventType">Type of Event / Shoot</label>
        <input id="eventType" name="eventType" required placeholder="Wedding, concert, music video, portrait session...">
      </div>

      <div class="field">
        <label for="details">Project Details</label>
        <textarea id="details" name="details" required placeholder="Tell us about your vision, location, timing, and anything else we should know..."></textarea>
      </div>

      <button class="button" type="submit">Send Booking Request</button>
    </form>
  </main>

  <footer class="footer">2026 OFFKEY MEDIA Productions - Capturing Moments in Motion</footer>
  <audio id="keySound" src="piano.mp3"></audio>
  <script src="script.js"></script>
</body>
</html>
