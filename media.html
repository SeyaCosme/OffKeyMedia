<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Media | OFF-KEY MEDIA</title>
  <link rel="icon" href="favicon.svg" type="image/svg+xml">
  <link rel="stylesheet" href="style.css">
</head>
<body class="site-page">
  <header class="page-header">
    <div class="header-inner">
      <button class="site-mark" onclick="go('index.html', event)">OFF-<span class="brand-key">KEY</span> MEDIA</button>
      <h1 class="page-title">Media</h1>
      <nav class="mini-piano" aria-label="Page navigation">
        <a class="mini-key" href="why.html" onclick="go('why.html', event)">Why</a>
        <a class="mini-key active" href="media.html" onclick="go('media.html', event)">Media</a>
        <a class="mini-key red" href="home.html" onclick="go('home.html', event)">Home</a>
        <a class="mini-key" href="pricing.html" onclick="go('pricing.html', event)">Pricing</a>
        <a class="mini-key" href="booking.html" onclick="go('booking.html', event)">Booking</a>
        <a class="mini-key" href="productions.html" onclick="go('productions.html', event)">Productions</a>
        <span class="mini-black-key one" aria-hidden="true"></span>
        <span class="mini-black-key two" aria-hidden="true"></span>
        <span class="mini-black-key three" aria-hidden="true"></span>
      </nav>
    </div>
  </header>

  <main class="media-stage">
    <section class="media-hero-panel" aria-live="polite">
      <div class="media-screen is-film" id="mediaScreen">
        <img id="mediaPhoto" src="floandhiscam.jpg" alt="Off-Key Media preview">
        <div class="screen-grain"></div>
        <div class="screen-copy">
          <p id="mediaType">Films</p>
          <h2 id="mediaTitle">OFF-<span class="brand-key">KEY</span> MEDIA</h2>
          <span id="mediaDescription">Narrative pieces, trailers, and cinematic ideas in motion.</span>
        </div>
      </div>

      <div class="media-orbits" aria-label="Media categories">
        <button class="media-bubble active" data-media="film" type="button">
          <span class="bubble-motion"></span>
          <strong>Films</strong>
        </button>
        <button class="media-bubble" data-media="events" type="button">
          <span class="bubble-motion"></span>
          <strong>Events</strong>
        </button>
        <button class="media-bubble" data-media="photos" type="button">
          <span class="bubble-photo"></span>
          <strong>Photos</strong>
        </button>
      </div>
    </section>
  </main>

  <footer class="footer">2026 OFF-<span class="brand-key">KEY</span> MEDIA Productions - Capturing Moments in Motion</footer>
  <audio id="keySound" src="piano.mp3"></audio>
  <script src="script.js"></script>
</body>
</html>
